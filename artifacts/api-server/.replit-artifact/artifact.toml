kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
# Builds the Node.js API server AND installs Python bot packages so the
# child process can import aiogram/aiohttp/etc. at runtime.
args = ["bash", "scripts/build-production.sh"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# Express starts, then spawns the Python bot as a child process when
# BOT_MODE=webhook and internal port 8082 is free. Python stdout/stderr
# are routed through Pino so they appear in Replit's log aggregator.
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
